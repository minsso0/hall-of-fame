<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>명예의 전당</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#1c1c1e" media="(prefers-color-scheme: dark)" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="명예의 전당" />
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
<div id="app">

  <!-- ===== LIST VIEW ===== -->
  <div id="view-list" class="view active">
    <header class="nav-bar">
      <h1 id="app-title" style="cursor:pointer">명예의 전당</h1>
      <button id="btn-add" class="icon-btn" aria-label="새 성취">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="22" height="22"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </button>
    </header>

    <div class="filter-tabs" id="filter-tabs">
      <button class="filter-tab active" data-cat="전체">전체</button>
      <button class="filter-tab" data-cat="기분향상">기분향상</button>
      <button class="filter-tab" data-cat="새로배움">새로배움</button>
      <button class="filter-tab" data-cat="튼튼한몸">튼튼한몸</button>
      <button class="filter-tab" data-cat="사람사랑">사람사랑</button>
    </div>

    <main id="entry-list-container">
      <div class="section-header">이번주 명예의 전당</div>
      <div id="pin-zone" class="pin-zone">
        <div id="pin-drop-hint" class="pin-drop-hint">카드를 여기로 드래그하세요</div>
        <ul id="pinned-list"></ul>
      </div>

      <div class="section-header">전체</div>
      <div id="empty-state" class="empty-state hidden">
        <p class="empty-title">아직 성취가 없어요</p>
        <p class="empty-sub">오른쪽 위 + 버튼으로<br>첫 번째 성취를 기록해보세요!</p>
      </div>
      <ul id="entry-list"></ul>
    </main>

    <nav class="tab-bar">
      <button class="tab-item active" data-tab="list">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="22" height="22"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
        <span>목록</span>
      </button>
      <button class="tab-item" data-tab="stats">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="22" height="22"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
        <span>통계</span>
      </button>
    </nav>
  </div>

  <!-- ===== STATS VIEW ===== -->
  <div id="view-stats" class="view">
    <header class="nav-bar">
      <h1>통계</h1>
    </header>
    <main class="stats-main" id="stats-content"></main>
    <nav class="tab-bar">
      <button class="tab-item" data-tab="list">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="22" height="22"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
        <span>목록</span>
      </button>
      <button class="tab-item active" data-tab="stats">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="22" height="22"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
        <span>통계</span>
      </button>
    </nav>
  </div>

  <!-- ===== ADD VIEW ===== -->
  <div id="view-add" class="view">
    <header class="nav-bar">
      <button id="btn-cancel" class="text-btn">취소</button>
      <h2>뉴 명예</h2>
      <button id="btn-save" class="text-btn primary" disabled>저장</button>
    </header>
    <main class="add-main">
      <div class="field-group">
        <label class="field-label">카테고리 <span class="required">*</span></label>
        <div class="chip-group" id="category-chips">
          <button class="chip" data-value="기분향상">기분향상</button>
          <button class="chip" data-value="새로배움">새로배움</button>
          <button class="chip" data-value="튼튼한몸">튼튼한몸</button>
          <button class="chip" data-value="사람사랑">사람사랑</button>
        </div>
      </div>

      <div class="field-group">
        <label class="field-label">내용</label>
        <textarea id="entry-text" placeholder="어떤 성취를 이루었나요? 자세히 기록해보세요."></textarea>
      </div>

      <label class="photo-picker-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
        사진 추가하기
        <input type="file" id="photo-input" accept="image/*" multiple hidden />
      </label>
      <div id="preview-container" class="preview-container"></div>
    </main>
  </div>

  <!-- ===== DETAIL VIEW ===== -->
  <div id="view-detail" class="view">
    <header class="nav-bar">
      <button id="btn-back" class="icon-btn" aria-label="뒤로">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="22" height="22"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <h2>성취 기록</h2>
      <div style="display:flex;gap:4px">
        <button id="btn-pin" class="icon-btn" aria-label="핀 고정">📌</button>
        <button id="btn-delete" class="icon-btn danger" aria-label="삭제">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="20" height="20"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>
        </button>
      </div>
    </header>
    <main id="detail-content" class="detail-main"></main>
  </div>

  <!-- ===== FULLSCREEN IMAGE ===== -->
  <div id="fullscreen" class="fullscreen hidden">
    <button id="btn-fullscreen-close" aria-label="닫기">✕</button>
    <img id="fullscreen-img" src="" alt="전체 화면" />
  </div>

  <!-- ===== CONFETTI CANVAS ===== -->
  <canvas id="confetti-canvas"></canvas>

</div>
<script src="app.js"></script>
<script>if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');</script>
</body>
</html>
