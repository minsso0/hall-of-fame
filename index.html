<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>나의 기록</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#ffffff" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="나의 기록" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <!-- List View -->
    <div id="view-list" class="view active">
      <header class="nav-bar">
        <h1>나의 기록</h1>
        <button id="btn-add" class="icon-btn" aria-label="새 기록">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="22" height="22"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </button>
      </header>
      <main id="entry-list-container">
        <div id="empty-state" class="empty-state hidden">
          <div class="empty-icon">🗒️</div>
          <p class="empty-title">아직 기록이 없어요</p>
          <p class="empty-sub">오른쪽 위 + 버튼으로<br>첫 기록을 남겨보세요 :)</p>
        </div>
        <ul id="entry-list"></ul>
      </main>
    </div>

    <!-- Add View -->
    <div id="view-add" class="view">
      <header class="nav-bar">
        <button id="btn-cancel" class="text-btn">취소</button>
        <h2>새 기록</h2>
        <button id="btn-save" class="text-btn primary" disabled>저장</button>
      </header>
      <main class="add-main">
        <textarea id="entry-text" placeholder="오늘 어땠나요? 글, 사진, 또는 둘 다 남겨보세요."></textarea>
        <label class="photo-picker-btn">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
          사진 추가하기
          <input type="file" id="photo-input" accept="image/*" multiple hidden />
        </label>
        <div id="preview-container" class="preview-container"></div>
      </main>
    </div>

    <!-- Detail View -->
    <div id="view-detail" class="view">
      <header class="nav-bar">
        <button id="btn-back" class="icon-btn" aria-label="뒤로">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="22" height="22"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
        <h2>기록</h2>
        <button id="btn-delete" class="icon-btn danger" aria-label="삭제">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="20" height="20"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>
        </button>
      </header>
      <main id="detail-content" class="detail-main"></main>
    </div>

    <!-- Fullscreen Image -->
    <div id="fullscreen" class="fullscreen hidden">
      <button id="btn-fullscreen-close" aria-label="닫기">✕</button>
      <img id="fullscreen-img" src="" alt="전체 화면 이미지" />
    </div>
  </div>

  <script src="app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js');
    }
  </script>
</body>
</html>
